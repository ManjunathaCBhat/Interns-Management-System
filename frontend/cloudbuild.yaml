# Frontend-only Cloud Build
# Runs: npm ci → npm run build → deploy

steps:
  # Install dependencies
  - name: 'node:20'
    id: 'npm-ci'
    entrypoint: 'npm'
    args: ['ci']

  # Build (npm run build - AUTOMATIC!)
  - name: 'node:20'
    id: 'npm-build'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_API_URL=${_BACKEND_URL}/api/v1'
      - 'VITE_AZURE_CLIENT_ID=${_AZURE_CLIENT_ID}'
      - 'VITE_AZURE_TENANT_ID=${_AZURE_TENANT_ID}'
      - 'VITE_AZURE_REDIRECT_URI=${_AZURE_REDIRECT_URI}'

  # Create Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    id: 'create-dockerfile'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cat > Dockerfile << 'EOF'
        FROM nginx:alpine
        COPY dist /usr/share/nginx/html
        COPY nginx.conf /etc/nginx/conf.d/default.conf
        EXPOSE 8080
        CMD ["nginx", "-g", "daemon off;"]
        EOF

        cat > nginx.conf << 'EOF'
        server {
            listen 8080;
            root /usr/share/nginx/html;
            index index.html;
            location / {
                try_files $$uri $$uri/ /index.html;
            }
            gzip on;
            gzip_types text/plain text/css application/json application/javascript;
        }
        EOF

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/interns360-frontend:$SHORT_SHA', '.']

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/interns360-frontend:$SHORT_SHA']

  # Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'interns360-frontend'
      - '--image=gcr.io/$PROJECT_ID/interns360-frontend:$SHORT_SHA'
      - '--region=europe-west1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--port=8080'

images:
  - 'gcr.io/$PROJECT_ID/interns360-frontend:$SHORT_SHA'

timeout: '900s'

substitutions:
  _BACKEND_URL: 'https://interns360-697140918049.europe-west1.run.app'
  _AZURE_CLIENT_ID: 'dd2ad1eb-6c5e-46c9-82bf-edda71230acf'
  _AZURE_TENANT_ID: 'a858d9da-8dfa-4b12-9f90-d0448a34f6d1'
  _AZURE_REDIRECT_URI: 'https://interns360-frontend-697140918049.europe-west1.run.app/auth/azure-callback'
