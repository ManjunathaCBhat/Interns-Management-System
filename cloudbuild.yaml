# Cloud Build Configuration
# Backend: Direct deploy (no build needed - it's Python)
# Frontend: npm run build + deploy

steps:
  # ================================
  # BACKEND - Direct Deploy (No Build)
  # ================================
  # NOTE: Backend environment variables are managed directly in Cloud Run service
  # To update env vars: gcloud run services update interns360 --update-env-vars KEY=VALUE
  # Or use Cloud Run Console: https://console.cloud.google.com/run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'interns360'
      - '--source=backend/'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--timeout=300s'
      - '--port=8000'
      # Environment variables are preserved from Cloud Run service configuration
      # No --update-env-vars flag = existing env vars are kept

  # ================================
  # FRONTEND - Build Required
  # ================================

  # Step 1: Install dependencies
  - name: 'node:20'
    id: 'npm-install'
    entrypoint: 'npm'
    args: ['ci']
    dir: 'frontend'

  # Step 2: Build frontend (npm run build - AUTOMATIC!)
  - name: 'node:20'
    id: 'npm-build'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'frontend'
    env:
      - 'VITE_API_URL=${_BACKEND_URL}/api/v1'
      - 'VITE_AZURE_CLIENT_ID=${_AZURE_CLIENT_ID}'
      - 'VITE_AZURE_TENANT_ID=${_AZURE_TENANT_ID}'
      - 'VITE_AZURE_REDIRECT_URI=${_AZURE_REDIRECT_URI}'

  # Step 3: Create Dockerfile for built frontend
  - name: 'gcr.io/cloud-builders/docker'
    id: 'create-dockerfile'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cat > frontend/Dockerfile << 'EOF'
        FROM nginx:alpine
        COPY dist /usr/share/nginx/html
        COPY nginx.conf /etc/nginx/conf.d/default.conf
        EXPOSE 8080
        CMD ["nginx", "-g", "daemon off;"]
        EOF

        cat > frontend/nginx.conf << 'EOF'
        server {
            listen 8080;
            root /usr/share/nginx/html;
            index index.html;
            location / {
                try_files $$uri $$uri/ /index.html;
            }
            gzip on;
            gzip_types text/plain text/css application/json application/javascript;
        }
        EOF

  # Step 4: Build Docker image with built frontend
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/interns360-frontend:$SHORT_SHA'
      - 'frontend/'

  # Step 5: Push image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/interns360-frontend:$SHORT_SHA'

  # Step 6: Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'interns360-frontend'
      - '--image=gcr.io/$PROJECT_ID/interns360-frontend:$SHORT_SHA'
      - '--region=europe-west1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--port=8080'

images:
  - 'gcr.io/$PROJECT_ID/interns360-frontend:$SHORT_SHA'

timeout: '1200s'

# Set these in Cloud Build trigger or use default values below
# These are used ONLY for frontend build-time environment variables
substitutions:
  _BACKEND_URL: 'https://interns360-697140918049.europe-west1.run.app'
  _AZURE_CLIENT_ID: 'dd2ad1eb-6c5e-46c9-82bf-edda71230acf'
  _AZURE_TENANT_ID: 'a858d9da-8dfa-4b12-9f90-d0448a34f6d1'
  _AZURE_REDIRECT_URI: 'https://interns360-frontend-697140918049.europe-west1.run.app/auth/azure-callback'

# SECURITY NOTE:
# Backend environment variables (MONGODB_URL, SECRET_KEY, etc.) are managed directly
# in the Cloud Run service, NOT in this file. This keeps sensitive credentials out of Git.
#
# To manage backend env vars:
# 1. Cloud Console: https://console.cloud.google.com/run → interns360 → Edit & Deploy New Revision → Variables & Secrets
# 2. CLI: gcloud run services update interns360 --update-env-vars KEY=VALUE --region=europe-west1
# 3. Secret Manager (recommended): gcloud run services update interns360 --set-secrets=KEY=SECRET_NAME:latest
