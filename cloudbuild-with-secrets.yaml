# Cloud Build Configuration - With Secret Manager Integration
# This version fetches ALL secrets from GCP Secret Manager during deployment

steps:
  # ================================
  # STEP 1: Build Docker Image
  # ================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/interns360:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/interns360:latest'
      - '--build-arg'
      - 'VITE_API_URL=/api/v1'
      - '--build-arg'
      - 'VITE_AZURE_CLIENT_ID=${_AZURE_CLIENT_ID}'
      - '--build-arg'
      - 'VITE_AZURE_TENANT_ID=${_AZURE_TENANT_ID}'
      - '--build-arg'
      - 'VITE_AZURE_REDIRECT_URI=${_AZURE_REDIRECT_URI}'
      - '.'

  # ================================
  # STEP 2: Push Docker Image to GCR
  # ================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/interns360'

  # ================================
  # STEP 3: Deploy to Cloud Run with Secrets
  # ================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'interns360'
      - '--image=gcr.io/$PROJECT_ID/interns360:$SHORT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--timeout=300s'
      - '--port=8000'
      # Fetch secrets from Secret Manager
      - '--set-secrets=MONGODB_URL=mongodb-url:latest'
      - '--set-secrets=SECRET_KEY=jwt-secret-key:latest'
      - '--set-secrets=AZURE_SECRET_KEY=azure-secret-key:latest'
      # Set regular environment variables
      - '--set-env-vars=MONGODB_DB_NAME=intern_lifecycle'
      - '--set-env-vars=ALGORITHM=HS256'
      - '--set-env-vars=ACCESS_TOKEN_EXPIRE_MINUTES=1440'
      - '--set-env-vars=BACKEND_CORS_ORIGINS=["https://interns360-697140918049.europe-west1.run.app"]'
      - '--set-env-vars=tenant_id=${_AZURE_TENANT_ID}'
      - '--set-env-vars=client_id=${_AZURE_CLIENT_ID}'
      - '--set-env-vars=AZURE_REDIRECT_URI=${_AZURE_REDIRECT_URI}'

timeout: '1200s'

# Images to store in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/interns360:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/interns360:latest'

# Declare secrets that Cloud Build can access
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/mongodb-url/versions/latest
      env: 'MONGODB_URL'
    - versionName: projects/$PROJECT_ID/secrets/jwt-secret-key/versions/latest
      env: 'SECRET_KEY'
    - versionName: projects/$PROJECT_ID/secrets/azure-secret-key/versions/latest
      env: 'AZURE_SECRET_KEY'

# Frontend build-time variables (baked into JS bundle at build time)
substitutions:
  _BACKEND_URL: 'https://interns360-697140918049.europe-west1.run.app'
  _AZURE_CLIENT_ID: 'dd2ad1eb-6c5e-46c9-82bf-edda71230acf'
  _AZURE_TENANT_ID: 'a858d9da-8dfa-4b12-9f90-d0448a34f6d1'
  _AZURE_REDIRECT_URI: 'https://interns360-697140918049.europe-west1.run.app/auth/azure-callback'

# =============================================================================
# SETUP INSTRUCTIONS:
# =============================================================================
#
# 1. Create secrets in Secret Manager (one-time setup):
#
#    echo -n "mongodb+srv://user:pass@cluster.mongodb.net/" | \
#      gcloud secrets create mongodb-url --data-file=-
#
#    echo -n "your-super-secret-jwt-key-min-32-characters" | \
#      gcloud secrets create jwt-secret-key --data-file=-
#
#    echo -n "your-azure-client-secret" | \
#      gcloud secrets create azure-secret-key --data-file=-
#
# 2. Grant Cloud Build access to secrets:
#
#    PROJECT_ID=$(gcloud config get-value project)
#    PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
#
#    gcloud secrets add-iam-policy-binding mongodb-url \
#      --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#      --role="roles/secretmanager.secretAccessor"
#
#    gcloud secrets add-iam-policy-binding jwt-secret-key \
#      --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#      --role="roles/secretmanager.secretAccessor"
#
#    gcloud secrets add-iam-policy-binding azure-secret-key \
#      --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#      --role="roles/secretmanager.secretAccessor"
#
# 3. Grant Cloud Run service account access to secrets:
#
#    gcloud secrets add-iam-policy-binding mongodb-url \
#      --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
#      --role="roles/secretmanager.secretAccessor"
#
#    gcloud secrets add-iam-policy-binding jwt-secret-key \
#      --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
#      --role="roles/secretmanager.secretAccessor"
#
#    gcloud secrets add-iam-policy-binding azure-secret-key \
#      --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
#      --role="roles/secretmanager.secretAccessor"
#
# 4. Deploy using this configuration:
#
#    gcloud builds submit --config=cloudbuild-with-secrets.yaml
#
# =============================================================================
